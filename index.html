<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<title>Mənim Saytım</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background: #f2f2f2;
}

h1{
    color: #333;
}

button{
    padding: 10px 20px;
    font-size: 18px;
    background: blue;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover{
    background: darkblue;
}
</style>
</head>

<body>

<h1>Salam! Bu mənim ilk saytım</h1>
<p>Düyməyə bas və mesaj gör</p>

<button onclick="mesaj()">Bas</button>

<script>
function mesaj(){
    alert("Təbriklər! Sənin proqramın işləyir 🚀");
}
</script>

</body>
</html>
